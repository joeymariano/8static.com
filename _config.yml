# Site settings
title: 8static.com
short_title: 8static
tagline: "Philadelphia's Chiptune & Electronic Arts Showcase at PhilaMOCA"
email: joey@8static.com
url: https://8static.com
description: "Philadelphia's chiptune & electronic arts showcase at PhilaMOCA. Live performances pushing the limits of sound chips, hacking hardware, pixel art, and creative coding."
keywords: "chiptune, live music, electronic music, 8bit, 16bit, nerd music, PhilaMOCA, Philadelphia, chip music, video game music, pixel art, demoscene"
skills: "Philadelphia's Electronic Arts Showcase at PhilaMOCA"
meta_author: Joey Mariano
image: img/crowd.jpg
image_width: 1005
image_height: 423

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
# contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
# disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 000000 #80B3FF
  primary-rgb: "255,108.1,168.8" #"128,179,255"
  secondary: 2c3e50 #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: 8static
  location: Philadelphia
  social: Around the Web
  credits: Credits

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: facebook
    url: http://facebook.com/8static
  - title: bsky
    url: https://bsky.app/profile/8static.bsky.social
  - title: twitter
    url: http://twitter.com/8static

# Postal address (add as many lines as necessary)
address:
  - line: Philadelphia, PA

# Build settings
markdown: kramdown
permalink: pretty

#for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: ""

collections:
  artists:
    output: false
  fliers:
    output: false

# Don't ship the following to _site
exclude:
  # Original high-resolution image backups
  - img/high-quality
  - img/artists/high-quality
  - img/portfolio/high-quality
  - img/fliers/high-quality
  # Theme/repo files that aren't part of the site
  - screenshot.png
  - README.md
  - LICENCE
  - Rakefile
  - freelancer-theme-jekyll.gemspec
